services:
  mysql:
    image: mysql:8.4
    container_name: cloudbrain-medical-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: cloudbrain_medical
      MYSQL_USER: cloudbrain
      MYSQL_PASSWORD: cloudbrain_dev
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - cloudbrain_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "cloudbrain", "-pcloudbrain_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  cloudbrain_mysql_data:
